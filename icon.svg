<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c6bff"/><stop offset="100%" stop-color="#ff6b9d"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffd166"/><stop offset="100%" stop-color="#ff9f43"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Glow overlay -->
  <rect width="512" height="512" rx="110" fill="rgba(255,255,255,0.04)"/>
  <!-- Calendar body -->
  <rect x="96" y="160" width="320" height="256" rx="28" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <!-- Calendar header strip -->
  <rect x="96" y="160" width="320" height="72" rx="28" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="200" width="320" height="32" fill="rgba(255,255,255,0.25)"/>
  <!-- Binding rings -->
  <rect x="168" y="112" width="28" height="80" rx="14" fill="url(#gold)" filter="url(#glow)"/>
  <rect x="316" y="112" width="28" height="80" rx="14" fill="url(#gold)" filter="url(#glow)"/>
  <!-- Grid dots - row 1 -->
  <circle cx="168" cy="304" r="18" fill="rgba(255,255,255,0.9)"/>
  <circle cx="256" cy="304" r="18" fill="#ffd166"/>
  <circle cx="344" cy="304" r="18" fill="rgba(255,255,255,0.9)"/>
  <!-- Grid dots - row 2 -->
  <circle cx="168" cy="364" r="18" fill="rgba(255,255,255,0.6)"/>
  <circle cx="256" cy="364" r="18" fill="rgba(255,255,255,0.9)"/>
  <circle cx="344" cy="364" r="18" fill="rgba(255,255,255,0.6)"/>
  <!-- Star sparkles -->
  <circle cx="420" cy="100" r="10" fill="#ffd166" opacity="0.8"/>
  <circle cx="90" cy="130" r="7" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="440" cy="380" r="8" fill="#7c6bff" opacity="0.6"/>
  <circle cx="75" cy="380" r="6" fill="#ffd166" opacity="0.5"/>
  <!-- Text OV subtle -->
  <text x="256" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="32" fill="rgba(255,255,255,0.7)" letter-spacing="2">OV</text>
</svg>
